name: Run Tests on Push

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        python-version: [ '3.9', '3.10', '3.11' ]
    
    steps:
    # Checkout code
    - name: Checkout code
      uses: actions/checkout@v3
    
    # Setup Python
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'
    
    # Install dependencies
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt
        pip install pytest pytest-cov pytest-asyncio httpx
    
    # Run lint checks
    - name: Lint with flake8
      run: |
        pip install flake8
        # Exit on error for critical issues
        flake8 backend/ --count --select=E9,F63,F7,F82 --show-source --statistics
        # Warn on style issues
        flake8 backend/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
      continue-on-error: true
    
    # Run type checking
    - name: Type check with mypy
      run: |
        pip install mypy
        mypy backend/ --ignore-missing-imports
      continue-on-error: true
    
    # Run unit tests
    - name: Run unit tests
      run: |
        pytest backend/tests/ -v --tb=short
      working-directory: ./
    
    # Run integration tests
    - name: Run integration tests (MasterAgent routes)
      run: |
        pytest backend/tests/test_master_agent_routes.py -v --tb=short
      working-directory: ./
    
    # Run PDF generation tests
    - name: Run PDF generation tests
      run: |
        pytest backend/tests/test_pdf_generation.py -v --tb=short
      working-directory: ./
    
    # Generate coverage report
    - name: Generate coverage report
      run: |
        pytest backend/tests/ --cov=backend --cov-report=xml --cov-report=term
      continue-on-error: true
    
    # Upload coverage to Codecov
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
      continue-on-error: true
    
    # Create test report
    - name: Create test report
      if: always()
      run: |
        mkdir -p test-reports
        pytest backend/tests/ --junit-xml=test-reports/junit.xml --html=test-reports/report.html --self-contained-html || true
    
    # Upload test report
    - name: Upload test report
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: test-report-${{ matrix.python-version }}
        path: test-reports/
    
    # Comment PR with results
    - name: Comment PR with test results
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v6
      with:
        script: |
          const fs = require('fs');
          const testResults = 'All tests completed. Check artifacts for detailed reports.';
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: '✅ Test suite executed: ' + testResults
          });
      continue-on-error: true

  # Code quality checks
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt
        pip install pylint black isort
    
    - name: Check code formatting with black
      run: |
        black --check backend/ || true
    
    - name: Check import sorting with isort
      run: |
        isort --check-only backend/ || true
    
    - name: Lint with pylint
      run: |
        pylint backend/agents/ backend/app.py --exit-zero --max-line-length=120
      continue-on-error: true

  # Security checks
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install bandit safety
    
    - name: Run bandit security scan
      run: |
        bandit -r backend/ -ll --exit-zero
      continue-on-error: true
    
    - name: Check for known vulnerabilities
      run: |
        safety check --json
      continue-on-error: true

  # Build and test Docker image (optional)
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    
    - name: Build Docker image
      uses: docker/build-push-action@v4
      with:
        context: .
        push: false
        tags: tatacapital-backend:${{ github.sha }}
      continue-on-error: true

  # Summary job
  summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [ test, code-quality, security ]
    if: always()
    
    steps:
    - name: Test results summary
      run: |
        echo "## Test Execution Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "✅ Unit Tests: ${{ needs.test.result }}" >> $GITHUB_STEP_SUMMARY
        echo "✅ Code Quality: ${{ needs.code-quality.result }}" >> $GITHUB_STEP_SUMMARY
        echo "✅ Security Scan: ${{ needs.security.result }}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Python Versions Tested:** 3.9, 3.10, 3.11" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Test Coverage:**" >> $GITHUB_STEP_SUMMARY
        echo "- MasterAgent Routes (approval, salary, rejection flows)" >> $GITHUB_STEP_SUMMARY
        echo "- PDF Generation (creation, persistence, content)" >> $GITHUB_STEP_SUMMARY
        echo "- Integration Tests" >> $GITHUB_STEP_SUMMARY
