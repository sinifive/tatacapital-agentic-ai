version: '3.9'

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: tatacapital-frontend
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend
    networks:
      - tatacapital-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tatacapital-backend
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - MOCK_SERVICES_URL=http://mock-services:9000
    depends_on:
      - mock-services
    networks:
      - tatacapital-network
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  mock-services:
    build:
      context: ./prototypes/mock_services
      dockerfile: Dockerfile
    container_name: tatacapital-mock-services
    ports:
      - "9000:9000"
    environment:
      - PYTHONUNBUFFERED=1
    networks:
      - tatacapital-network
    command: python app.py

networks:
  tatacapital-network:
    driver: bridge
