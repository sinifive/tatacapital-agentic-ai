[pytest]
# Pytest configuration for Tata Capital Agentic AI

# Test discovery patterns
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Output options
addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    -ra

# Test paths
testpaths = backend/tests

# Markers for categorizing tests
markers =
    unit: Unit tests (no external dependencies)
    integration: Integration tests (require external services)
    routes: API route tests
    pdf: PDF generation tests
    slow: Slow running tests
    smoke: Smoke tests
    production: Production-ready tests

# Asyncio configuration
asyncio_mode = auto

# Coverage options
[coverage:run]
source = backend
omit = 
    */tests/*
    */test_*.py
    */__pycache__/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
